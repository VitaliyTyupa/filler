<mat-toolbar>
  <div class="logo">
    <button mat-button (click)="newGame()">
      <mat-icon>autorenew</mat-icon>
    </button>
    <span class="brand">Filler</span>
  </div>
  <span class="spacer"></span>
  <ng-container *ngIf="user$ | async as user; else loginAction">
    <div class="auth-actions">
      <span class="username">{{ user.username }}</span>
      <button class="avatar" mat-icon-button type="button" (click)="openProfile()" aria-label="Профіль">
        <mat-icon>account_circle</mat-icon>
      </button>
      <button mat-icon-button type="button" (click)="logout()" aria-label="Вийти">
        <mat-icon>logout</mat-icon>
      </button>
    </div>
  </ng-container>
  <ng-template #loginAction>
    <button mat-icon-button type="button" (click)="login()" aria-label="Логін">
      <mat-icon>login</mat-icon>
    </button>
  </ng-template>
</mat-toolbar>
