@if (result && settings) {
  <section class="final-page">
    <mat-card appearance="outlined">
      <mat-card-header>
        <mat-card-title>
          @if (winnerName) {
            Переміг {{ winnerName }}
          } @else {
            Нічия
          }
        </mat-card-title>
      </mat-card-header>

      <mat-card-content>
        <div class="summary">
          <div class="score-card" [class.winner]="result.winner === 1">
            <h2>{{ getPlayerName(1) }}</h2>
            <p class="score">{{ getPlayerScore(1) }}</p>
          </div>
          <div class="score-card" [class.winner]="result.winner === 2">
            <h2>{{ getPlayerName(2) }}</h2>
            <p class="score">{{ getPlayerScore(2) }}</p>
          </div>
        </div>
      </mat-card-content>

      <mat-card-actions align="end">
        <div class="actions">
          <button mat-raised-button color="primary" type="button" (click)="restart()">
            Почати гру з початку
          </button>
          <button mat-stroked-button type="button" (click)="newGame()">Налаштувати нову гру</button>
        </div>
      </mat-card-actions>
    </mat-card>
  </section>
} @else {
  <p class="redirecting">Переадресація...</p>
}
