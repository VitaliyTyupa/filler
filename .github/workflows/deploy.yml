name: Build & Push Images

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 🔹 Frontend
      - name: Build frontend
        run: docker build -t ghcr.io/${{ env.OWNER }}/filler-frontend:latest .

      - name: Push frontend
        run: docker push ghcr.io/${{ env.OWNER }}/filler-frontend:latest

      # 🔹 Backend
      - name: Build backend
        run: docker build -t ghcr.io/${{ env.OWNER }}/filler-backend:latest ./apps/server

      - name: Push backend
        run: docker push ghcr.io/${{ env.OWNER }}/filler-backend:latest
